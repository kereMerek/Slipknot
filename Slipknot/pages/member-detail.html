<!DOCTYPE html>
<html lang="tr">
<head>
    <link rel="icon" type="image/jpeg" href="../Resimler/site-icon.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERSONNEL_FILE // MAGGOT_OS</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Metal+Mania&family=Oswald:wght@700&family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS Dosyaları/u1.css">
    
    <style>
        body { background-color: #000; color: #fff; overflow-x: hidden; cursor: crosshair; }
        .detail-container { position: relative; z-index: 2; padding-top: 40px; min-height: 100vh; }
        .stat-badge { border: 1px solid; padding: 2px 10px; font-size: 0.7rem; font-family: 'Oswald'; }
        .bio-box { background: rgba(20, 0, 0, 0.4); border-left: 4px solid var(--pure-red); padding: 20px; }
        
        /* Navbar Özelleştirme (u1.css ile uyumlu) */
        .navbar { background: rgba(5,0,0,0.9) !important; border-bottom: 1px solid var(--dried-blood); }
        .slipknot-brand { font-family: 'Metal Mania'; color: var(--pure-red) !important; font-size: 1.5rem; letter-spacing: 2px; }
        .slipknot-nav .nav-link { 
            font-family: 'Oswald'; 
            color: var(--dim-white) !important; 
            font-size: 0.85rem; 
            letter-spacing: 2px; 
            padding: 10px 20px !important; 
            transition: 0.3s;
        }
        .slipknot-nav .nav-link:hover { color: var(--pure-red) !important; text-shadow: 0 0 10px var(--pure-red); }
    </style>
</head>
<body>

    <div class="scanline-overlay"></div>

    <nav class="navbar navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand slipknot-brand" href="../HTML Dosyaları/index.html">MAGGOT//OS [9]</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span style="display:block;width:22px;height:2px;background:var(--pure-red);margin:5px 0;"></span>
      <span style="display:block;width:22px;height:2px;background:var(--pure-red);margin:5px 0;"></span>
      <span style="display:block;width:22px;height:2px;background:var(--pure-red);margin:5px 0;"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto slipknot-nav">
        <li class="nav-item"><a class="nav-link" href="../HTML Dosyaları/system.html">IOWA_SYSTEM</a></li>
        <li class="nav-item"><a class="nav-link" href="../HTML Dosyaları/mask.html">MASKS</a></li>
        <li class="nav-item"><a class="nav-link" href="../HTML Dosyaları/discograpy.html">DISCOGRAPHY</a></li>
        <li class="nav-item"><a class="nav-link" href="../HTML Dosyaları/terminal.html">TERMINAL</a></li>
        <li class="nav-item"><a class="nav-link" href="../HTML Dosyaları/knotfest.html">KNOTFEST</a></li>
      </ul>
    </div>
  </div>
</nav>

    <div id="root"></div>

    <script type="text/babel">
        const membersData = [
            {
                id: "0", num: "#0", name: "SID WILSON", role: "TURNTABLES / DJ",
                mask: "GAS MASK / ROBOT HELMET", joined: "1998", status: "ACTIVE", rip: false,
                img: "../Resimler/SID WILSON.jpg",
                fullBio: "Sid, grubun en enerjik üyesidir. Sahnedeki çılgın atlayışları ve turntable yetenekleriyle Slipknot sesine alien/DJ etkisini katmıştır.",
                maskEvolution: ["Original Gas Mask", "Skull Mask", "Animatronic Face"],
                iconicMoments: ["Stage diving from 10ft", "Scary turntable scratches on (sic)", "Grammy victory"]
            },
            {
                id: "1", num: "#1", name: "JOEY JORDISON", role: "DRUMS [1975 — 2021]",
                mask: "KABUKI / WHITE DEMON MASK", joined: "1995", status: "R.I.P.", rip: true,
                img: "../Resimler/joey-jordison.jpg",
                fullBio: "Joey Jordison, Slipknot'un kurucu üyelerinden ve gelmiş geçmiş en iyi davulculardan biridir. Grubun kendine has agresif ritminin mimarıdır.",
                maskEvolution: ["Classic Kabuki (99)", "Stitched Lips (Iowa)", "Crown of Thorns (AHIG)"],
                iconicMoments: ["The rotating drum kit heist", "1999 Ozzfest Breakthrough", "Creating Murderdolls"]
            },
            {
                id: "2", num: "#2", name: "ALESSANDRO VENTURELLA", role: "BASS GUITAR",
                mask: "PROSTHETIC FACE MASK", joined: "2014", status: "ACTIVE", rip: false,
                img: "../Resimler/ALESSANDRO VENTURELLA.jpg",
                fullBio: "V-Man, Paul Gray'in ardından bas gitarda grubun ritmik temelini devraldı. Teknik becerisi ve sahne duruşuyla kısa sürede grubun vazgeçilmezi oldu.",
                maskEvolution: ["Hand-painted mask", "Detailed Prosthetic", "Hybrid Texture"],
                iconicMoments: ["Joining in .5: The Gray Chapter", "The Knotfest debuts", "Expanding the bass textures"]
            },
            {
                id: "3", num: "#3", name: "MICHAEL PFAFF", role: "CUSTOM PERCUSSION",
                mask: "TORTILLA MAN SOMBRERO MASK", joined: "2019", status: "ACTIVE", rip: false,
                img: "../Resimler/MICHAEL PFAFF.webp",
                fullBio: "Tortilla Man lakaplı Michael, perküsyonda kaotik bir enerji sunuyor. Sahnedeki akrobatik hareketleri ve beklenmedik çıkışlarıyla tanınır.",
                maskEvolution: ["Blank Tortilla", "Burned version", "Sombrero integrated"],
                iconicMoments: ["Secret identity era", "WANYK World Tour energy", "Backing vocals intensity"]
            },
            {
                id: "4", num: "#4", name: "JAMES ROOT", role: "GUITAR",
                mask: "JESTER / MINIMALIST MASK", joined: "1999", status: "ACTIVE", rip: false,
                img: "../Resimler/JAMES ROOT.jpg",
                fullBio: "Jim Root, grubun melodik yapısını belirleyen ana gitaristlerden biridir. Dev cüssesi ve sakin ama sert çalış tarzıyla bilinir.",
                maskEvolution: ["Jester mask", "Sleek White", "Minimalist Black & White"],
                iconicMoments: ["Joining for the debut album", "Writing major riffs for Iowa", "Signature Fender series"]
            },
            {
                id: "5", num: "#5", name: "CRAIG JONES", role: "SAMPLER / KEYBOARD",
                mask: "SPIKE MASK", joined: "1996", status: "ACTIVE", rip: false,
                img: "../Resimler/CRAIG JONES.jpg",
                fullBio: "133. Grubun en gizemli üyesi. Neredeyse hiç konuşmaz. Slipknot şarkılarının altındaki ürkütücü seslerin ve örneklemelerin yaratıcısıdır.",
                maskEvolution: ["Space Helmet", "Original Spikes", "Modern Long Spikes"],
                iconicMoments: ["The 'Kill Me' t-shirt", "Opening (sic) with samples", "Decades of silence"]
            },
            {
                id: "6", num: "#6", name: "SHAWN CRAHAN", role: "PERCUSSION / CO-FOUNDER",
                mask: "THE CLOWN MASK", joined: "1995", status: "ACTIVE", rip: false,
                img: "../Resimler/SHAWN CLOWN CRAHAN.jpg",
                fullBio: "Clown, grubun beyni ve vizyoneridir. Slipknot'un sanat yönetimi, klipleri ve kaotik sahne performanslarının arkasındaki isimdir.",
                maskEvolution: ["Original Clown", "Rotting Face", "Mirror/Metallic Clown"],
                iconicMoments: ["Creating Slipknot", "Setting things on fire on stage", "Knotfest creation"]
            },
            {
                id: "7", num: "#7", name: "MICK THOMSON", role: "GUITAR",
                mask: "HOCKEY MASK / BLANK FACE", joined: "1996", status: "ACTIVE", rip: false,
                img: "../Resimler/MICK THOMSON.jpg",
                fullBio: "Seven. Sahnenin en korkutucu figürlerinden biridir. Mekanik ve agresif gitar riffleriyle grubun 'heavy' tonunu sağlar.",
                maskEvolution: ["Hockey Mask", "Metallic Leather", "Carbon Fiber Finish"],
                iconicMoments: ["Writing the riff for Psychosocial", "Stage headbanging style", "The signature Jackson guitars"]
            },
            {
                id: "8", num: "#8", name: "COREY TAYLOR", role: "VOCALS",
                mask: "EVOLVING HORROR MASKS", joined: "1997", status: "ACTIVE", rip: false,
                img: "../Resimler/COREY TAYLOR.jpg",
                fullBio: "Corey, modern metalin en önemli seslerinden biridir. Söz yazımı ve inanılmaz vokal menziliyle grubun lider figürüdür.",
                maskEvolution: ["Dreadlock Ghost", "Iowa Stitched", "Clear Resin / All Hope Is Gone"],
                iconicMoments: ["Recording Iowa", "Writing Snuff", "Leading the crowd's 'Jumpdafuckup'"]
            }
        ];

        function MemberDetailPage() {
            const urlParams = new URLSearchParams(window.location.search);
            const memberId = urlParams.get('id');
            const member = membersData.find(m => m.id === memberId);

            if (!member) {
                return (
                    <div className="container p-5 text-center">
                        <h1 className="glitch display-1" data-text="ERROR">404</h1>
                        <p className="h3 text-danger">PERSONNEL_DATA_NOT_FOUND</p>
                        <button className="btn-brutal mt-5" onClick={() => window.location.href='mask.html'}>
                            RETURN TO SYSTEM
                        </button>
                    </div>
                );
            }

            const statusColor = member.rip ? '#666' : 'var(--pure-red)';

            return (
                <div className="detail-container container">
                    <div className="row g-5">
                        <div className="col-lg-4">
                            <button className="btn-brutal mb-4 w-100" onClick={() => window.location.href='mask.html'}>
                                ← BACK_TO_MASKS
                            </button>
                            
                            <div className={`member-card ${member.rip ? 'rip' : ''}`}>
                                <div className="img-wrap" style={{ height: '400px' }}>
                                    <img src={member.img} alt={member.name} className="w-100 h-100 object-fit-cover" />
                                    <div className="img-overlay">
                                        <div className="member-num-big">{member.num}</div>
                                    </div>
                                </div>
                                <div className="member-body p-4 bg-black border border-danger border-top-0">
                                    <div className="mask-tag mb-2">⊞ {member.mask}</div>
                                    <div className="member-role small mb-3 text-secondary">{member.role}</div>
                                    <div className="barbed-divider my-3"></div>
                                    <div className="d-flex justify-content-between small mb-2">
                                        <span>SINCE:</span>
                                        <span className="text-danger">{member.joined}</span>
                                    </div>
                                    <div className="d-flex justify-content-between small">
                                        <span>STATUS:</span>
                                        <span style={{ color: statusColor, borderColor: statusColor }} className="stat-badge">{member.status}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="col-lg-8">
                            <div className="mb-5">
                                <p className="subtitle mb-1" style={{letterSpacing: '4px', color: 'var(--pure-red)'}}>// FILE_00{member.id} //</p>
                                <h1 className="glitch display-3" data-text={member.name}>{member.name}</h1>
                            </div>

                            <div className="bio-box mb-4">
                                <h3 className="h6 text-danger mb-3" style={{fontFamily:'Oswald'}}>BIOGRAPHY_DATA</h3>
                                <p style={{fontFamily: 'Courier New', fontSize: '1rem', lineHeight: '1.6', color: '#ccc'}}>{member.fullBio}</p>
                            </div>

                            <div className="p-4 border border-secondary bg-dark bg-opacity-25 mb-4">
                                <h3 className="h6 mb-3 text-white" style={{fontFamily:'Oswald'}}>MASK_EVOLUTION</h3>
                                <div className="barbed-divider"></div>
                                <ul className="list-unstyled mt-3">
                                    {member.maskEvolution.map((evo, i) => (
                                        <li key={i} className="mb-2 small text-secondary">
                                            <span className="text-danger me-2">[{i+1}]</span> {evo}
                                        </li>
                                    ))}
                                </ul>
                            </div>

                            <div className="p-4 border border-danger bg-dark bg-opacity-10">
                                <h3 className="h6 mb-3 text-danger" style={{fontFamily:'Oswald'}}>ICONIC_MOMENTS</h3>
                                <ul className="list-unstyled mt-3">
                                    {member.iconicMoments.map((moment, i) => (
                                        <li key={i} className="mb-2 small text-white opacity-75">
                                            ● {moment}
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MemberDetailPage />);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
